<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Song Share</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="song.css" />
    <link rel="stylesheet" href="auth.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="song-page">
    <div class="page">
      <header class="page-header">
        <div class="header-brand">
          <h1 class="logo"><a href="home.html">Song Share</a></h1>
          <p class="header-tagline">Genre · two sheets · prev / next</p>
        </div>
        <nav class="header-actions" aria-label="Toolbar">
          <a href="#" class="icon-btn js-open-reader" aria-label="Open full lyrics reader" title="Lyrics reader">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="10" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="2" />
              <path d="M14 14l6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </a>
          <a href="home.html" class="icon-btn" aria-label="Back to genre board">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h16M4 12h16M4 18h10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </a>
          <a href="home.html" class="icon-btn" aria-label="Home" title="Home">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm12-5a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </a>
          <a href="profile.html" class="icon-btn" aria-label="Profile">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2" />
              <path d="M4 20c2-4 6-6 8-6s6 2 8 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </a>
        </nav>
      </header>

      <main class="page-main">
        <div class="main-back" aria-hidden="true"></div>
        <div class="main-book" aria-hidden="true"></div>
        <div class="main-fore" aria-hidden="true"></div>

        <div class="subpage-inner">
          <div class="detail-main">
            <div class="stand-stage">
              <div class="stand-glow" aria-hidden="true"></div>

              <div class="stand-build" aria-hidden="true">
                <div class="stand-lyre">
                  <span class="stand-lyre-arm stand-lyre-arm--l"></span>
                  <span class="stand-lyre-arm stand-lyre-arm--r"></span>
                  <span class="stand-lyre-nib"></span>
                </div>
                <div class="stand-shelf"></div>
                <div class="stand-column"></div>
                <div class="stand-feet">
                  <span class="stand-foot stand-foot--l"></span>
                  <span class="stand-foot stand-foot--r"></span>
                </div>
              </div>

              <div class="papers-stack">
                <p class="detail-genre-wrap">
                  <span class="detail-genre-tag js-genre-label">Genre</span>
                </p>

                <div class="detail-panels">
                  <div class="detail-column detail-column--song">
                    <div class="sheet-stack">
                      <div class="sheet-tabs sheet-tabs--left" role="toolbar" aria-label="Song navigation">
                        <button type="button" class="tab-btn tab-btn--prev js-prev" aria-label="Previous song">&lt;</button>
                        <button type="button" class="tab-btn tab-btn--next js-next" aria-label="Next song">&gt;</button>
                      </div>
                      <div class="sheet-turn sheet-turn--song">
                        <section
                          class="detail-panel detail-panel--song sheet js-song-paper"
                          aria-labelledby="song-heading"
                          tabindex="0"
                          role="link"
                          aria-label="Song sheet — open lyrics notebook"
                        >
                          <div class="sheet-lines" aria-hidden="true"></div>
                          <div class="sheet-body sheet-body--song">
                            <h2 id="song-heading" class="detail-panel-heading sr-only">Song sheet</h2>
                            <p class="detail-panel-body detail-song-title js-song-title">—</p>
                            <p class="detail-song-artist js-song-artist" hidden></p>
                            <p class="detail-meta-line detail-annotation-meta js-annotation-meta" hidden></p>
                            <div class="detail-lyrics-wrap js-song-lyrics-wrap" hidden>
                              <div class="detail-lyrics-scroll">
                                <div class="detail-lyrics-page js-song-lyrics" role="text"></div>
                              </div>
                            </div>
                            <div class="song-stickies js-song-stickies" aria-hidden="true"></div>
                          </div>
                        </section>
                      </div>
                    </div>
                  </div>

                  <div class="detail-column detail-column--meaning">
                    <div class="sheet-stack">
                      <div class="sheet-tabs sheet-tabs--right" role="toolbar" aria-label="Close">
                        <button type="button" class="tab-btn tab-btn--close js-close" aria-label="Back to board">×</button>
                      </div>
                      <div class="sheet-turn sheet-turn--meaning js-sheet-turn-meaning">
                        <section
                          class="detail-panel detail-panel--meaning sheet js-meaning-paper"
                          aria-labelledby="meaning-heading"
                          tabindex="0"
                          role="button"
                          aria-label="Meaning sheet — open meaning notebook"
                        >
                          <div class="sheet-lines" aria-hidden="true"></div>
                          <div class="sheet-body">
                            <h2 id="meaning-heading" class="detail-panel-heading">Meaning</h2>
                            <p class="detail-meta-line detail-meaning-meta js-meaning-meta" hidden></p>
                            <div class="detail-panel-body detail-meaning js-meaning" aria-live="polite">—</div>
                          </div>
                        </section>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer class="page-footer">
        <div class="footer-sns" aria-label="Listen on streaming apps">
          <a class="sns-chip" href="https://open.spotify.com/" target="_blank" rel="noopener noreferrer" aria-label="Open Spotify">Spotify</a>
          <a class="sns-chip" href="https://music.apple.com/" target="_blank" rel="noopener noreferrer" aria-label="Open Apple Music">Apple Music</a>
          <a class="sns-chip" href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer" aria-label="Open YouTube">YouTube</a>
        </div>
      </footer>
    </div>

    <div
      id="song-sheet-modal"
      class="song-sheet-modal"
      hidden
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
      aria-labelledby="sheet-modal-title"
    >
      <button type="button" class="song-sheet-modal__scrim js-sheet-modal-close" tabindex="-1" aria-label="Close"></button>
      <div class="song-sheet-modal__stage">
        <div class="song-sheet-modal__slips js-modal-slips" aria-hidden="true"></div>
        <article class="song-sheet-modal__paper">
          <button type="button" class="song-sheet-modal__x js-sheet-modal-close" aria-label="Close">×</button>
          <div class="song-sheet-modal__paper-lines" aria-hidden="true"></div>
          <div class="song-sheet-modal__content">
            <h2 id="sheet-modal-title" class="song-sheet-modal__title js-modal-script-title">—</h2>
            <div class="song-sheet-modal__track-meta">
              <p class="song-sheet-modal__track-artist js-modal-track-artist" hidden></p>
              <p class="song-sheet-modal__track-released js-modal-track-released" hidden></p>
            </div>

            <div class="song-sheet-modal__sheet-body js-modal-body-song">
              <div class="song-sheet-modal__lyrics-annotated js-modal-lyrics-annotated">
                <div class="song-sheet-modal__lyrics-block">
                  <div class="song-sheet-modal__lyrics js-modal-lyrics" role="text"></div>
                  <div class="song-sheet-modal__modal-margin-slips js-modal-margin-slips" aria-hidden="true"></div>
                </div>
                <p class="song-sheet-modal__orphan-annotations-hint js-modal-orphan-hint" hidden>
                  Extra slips (no matching highlight in order) — highlight lyrics in the editor so each slip can sit beside a line.
                </p>
                <div class="song-sheet-modal__orphan-annotations js-modal-orphan-slips" hidden></div>
              </div>
            </div>

            <div class="song-sheet-modal__sheet-body song-sheet-modal__sheet-body--meaning js-modal-body-meaning" hidden>
              <p class="song-sheet-modal__meaning-kicker">Meaning</p>
              <div class="song-sheet-modal__meaning prose js-modal-meaning"></div>
              <p class="song-sheet-modal__meaning-sub js-modal-meaning-meta"></p>
            </div>
          </div>
        </article>
      </div>
    </div>

    <script src="auth-storage.js"></script>
    <script src="auth-gate.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="genres-data.js"></script>
    <script src="published-feed.js"></script>
    <script src="song-comments.js"></script>
    <script src="song-page.js"></script>
  </body>
</html>
