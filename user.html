<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>User Profile — Cr8Dig</title>
    <link rel="stylesheet" href="typefaces/fonts.css" />
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="user.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="page">
      <header class="page-header">
        <div class="header-brand">
          <h1 class="logo">
            <a href="home.html">Cr8Dig</a>
            <span class="logo-user-tag">User profile</span>
          </h1>
        </div>
        <div class="header-compose-toggle" role="group" aria-label="Create post type">
          <a href="profile.html?compose=song" class="profile-new-song header-compose-btn">New song</a>
          <a href="profile.html?compose=album" class="profile-new-album header-compose-btn">New album</a>
        </div>
        <nav class="header-actions" aria-label="Toolbar">
          <a href="home.html?openSearch=1" class="icon-btn" aria-label="Search lyrics" title="Search lyrics">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="10" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="2" />
              <path d="M14 14l6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </a>
          <a href="home.html" class="icon-btn" aria-label="Home" title="Home">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm12-5a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </a>
          <a href="profile.html" class="icon-btn" aria-label="My profile" title="My profile">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2" />
              <path d="M4 20c2-4 6-6 8-6s6 2 8 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </a>
        </nav>
      </header>

      <main class="page-main user-page-main">
        <div class="main-back" aria-hidden="true"></div>
        <div class="main-book" aria-hidden="true"></div>
        <div class="main-fore" aria-hidden="true"></div>

        <div class="subpage-inner">
          <section class="user-wrap" aria-labelledby="user-heading">
            <p class="user-kicker">Publisher</p>
            <h2 id="user-heading" class="user-name js-user-name">User</h2>
            <p class="user-meta js-user-meta">Loading posts…</p>
            <div class="user-posts js-user-posts" role="list"></div>
          </section>
        </div>
      </main>

      <footer class="page-footer">
        <div class="footer-sns" aria-label="Listen on streaming apps">
          <a class="sns-chip" href="https://open.spotify.com/" target="_blank" rel="noopener noreferrer" aria-label="Open Spotify">Spotify</a>
          <a class="sns-chip" href="https://music.apple.com/" target="_blank" rel="noopener noreferrer" aria-label="Open Apple Music">Apple Music</a>
          <a class="sns-chip" href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer" aria-label="Open YouTube">YouTube</a>
        </div>
      </footer>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
    <script defer src="supabase-config.js"></script>
    <script defer src="auth-storage.js"></script>
    <script defer src="auth-gate.js"></script>
    <script defer src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script defer src="genres-data.js"></script>
    <script defer src="published-feed.js"></script>
    <script defer src="songshare-remote-sync.js"></script>
    <script defer src="user.js"></script>
  </body>
</html>
