<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Meaning — Song Share</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="meaning-hub.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="meaning-hub-page">
    <div class="page">
      <header class="page-header">
        <div class="header-brand">
          <h1 class="logo"><a href="home.html">Song Share</a></h1>
          <p class="header-tagline"><span class="js-song-title">Song</span> · <span class="js-genre-name">Genre</span></p>
        </div>
        <nav class="header-actions" aria-label="Toolbar">
          <a href="home.html" class="icon-btn" aria-label="Back to genre board">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h16M4 12h16M4 18h10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </a>
          <a href="song-reader.html" class="icon-btn js-hub-reader-link" aria-label="Lyrics lookup" title="Lyrics lookup">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="10" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="2" />
              <path d="M14 14l6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </a>
          <a href="home.html" class="icon-btn" aria-label="Home" title="Home">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm12-5a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </a>
          <a href="profile.html" class="icon-btn" aria-label="Profile">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2" />
              <path d="M4 20c2-4 6-6 8-6s6 2 8 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </a>
        </nav>
      </header>

      <main class="page-main hub-page-main">
        <div class="main-back" aria-hidden="true"></div>
        <div class="main-book" aria-hidden="true"></div>
        <div class="main-fore" aria-hidden="true"></div>

        <div class="subpage-inner">
          <div class="hub-main">
            <div class="hub-grid">
              <aside class="hub-col hub-col--left" aria-label="Comments thread">
                <p class="hub-feed-label">Thread</p>
                <div class="hub-feed" id="hub-feed" aria-live="polite"></div>
                <div class="hub-compose">
                  <label class="hub-compose-label" for="hub-poster">Your name (optional)</label>
                  <input id="hub-poster" class="hub-compose-name" type="text" maxlength="80" placeholder="Guest" autocomplete="nickname" />
                  <label class="hub-compose-label" for="hub-body">Comment</label>
                  <textarea id="hub-body" class="hub-compose-body" rows="3" maxlength="2000" placeholder="Share a thought…"></textarea>
                  <div class="hub-compose-actions">
                    <button type="button" class="hub-compose-submit" id="hub-submit">Post</button>
                    <button type="button" class="hub-react-btn" data-mood="heart" title="Heart">♥</button>
                    <button type="button" class="hub-react-btn" data-mood="sad" title="Sad">:(</button>
                  </div>
                </div>
              </aside>

              <section class="hub-col hub-col--center">
                <div class="hub-meaning-stack">
                  <div class="hub-sheet-tabs">
                    <a href="#" class="hub-tab-btn js-hub-back" aria-label="Back to song detail">×</a>
                  </div>
                  <article class="hub-meaning-sheet">
                    <div class="hub-meaning-lines" aria-hidden="true"></div>
                    <div class="hub-meaning-inner">
                      <h1 class="hub-meaning-heading">Meaning</h1>
                      <div class="hub-meaning-text js-meaning-body"></div>
                    </div>
                  </article>
                </div>

                <div class="hub-fab">
                  <a href="#" class="js-fab-song">Song sheet</a>
                  <a href="#" class="js-fab-reader">Full lyrics</a>
                </div>
              </section>
            </div>
          </div>
        </div>
      </main>

      <footer class="page-footer">
        <div class="footer-sns" aria-label="Listen on streaming apps">
          <a class="sns-chip" href="https://open.spotify.com/" target="_blank" rel="noopener noreferrer">Spotify</a>
          <a class="sns-chip" href="https://music.apple.com/" target="_blank" rel="noopener noreferrer">Apple Music</a>
          <a class="sns-chip" href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer">YouTube</a>
        </div>
      </footer>
    </div>

    <script src="auth-storage.js"></script>
    <script src="auth-gate.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="genres-data.js"></script>
    <script src="published-feed.js"></script>
    <script src="thread-storage.js"></script>
    <script src="meaning-hub.js"></script>
  </body>
</html>
